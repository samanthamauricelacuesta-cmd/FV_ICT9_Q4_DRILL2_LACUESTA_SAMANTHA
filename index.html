<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat Index Checker</title>
</head>

<body>

<center>

<h1>Heat Index Checker</h1>

Temperature:
<input type="number" id="temp"><br><br>

Humidity:
<input type="number" id="hum"><br><br>

<button onclick="checkHeat()">Check Heat Index</button>

<script>

function checkHeat(){

    let temp = parseInt(document.getElementById("temp").value);
    let hum = parseInt(document.getElementById("hum").value);
    let message;

    switch(true){

        case (temp>=20 && temp<=24 && hum>=30 && hum<=50):
            message = "Comfortable / Cool";
            break;

        case (temp>=25 && temp<=27 && hum>=40 && hum<=60):
            message = "Warm";
            break;

        case (temp>=28 && temp<=31 && hum>=50 && hum<=70):
            message = "Hot";
            break;

        case (temp>=32 && temp<=35 && hum>=60 && hum<=80):
            message = "Very Hot / Caution";
            break;

        case (temp>=36 && hum>=70):
            message = "Extreme Heat / Danger";
            break;

        default:
            message = "Conditions not in the table";
    }

    alert(message);
}

</script>

</center>

</body>
</html>
